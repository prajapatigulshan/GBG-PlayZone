<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBG PlayZone - Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background Video & Overlay -->
<video autoplay muted loop id="bg-video">
    <source src="assets/videos/bg.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- Navigation -->
<nav>
    <div class="logo">GBG PlayZone</div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html">Games</a></li>
        <li><a href="tournaments.html">Tournaments</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="login.html" class="active">Login</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>

<!-- Login Section -->
<section id="login" class="center-section">
    <h1>Login to GBG PlayZone</h1>
    <p>Enter your credentials to access the platform</p>

    <form id="loginForm" class="register-form">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>

    <p style="color:white; margin-top:10px;">
        Don't have an account? <a href="register.html" style="color:#ffcc00;">Register</a>
    </p>
</section>

<!-- Footer -->
<footer>
    &copy; 2026 GBG PlayZone
</footer>

<!-- Click sound effect -->
<audio id="clickSound" src="assets/sounds/click.mp3"></audio>

<script src="script.js"></script>
<script>
// Login form submit
const loginForm = document.getElementById('loginForm');
if(loginForm){
    loginForm.addEventListener('submit', (e)=>{
        e.preventDefault();
        playClickSound();
        alert('Login Successful! Welcome to GBG PlayZone 🎮');
        loginForm.reset();
    });
}
</script>

</body>
</html>
