<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBG PlayZone - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="logo">GBG PlayZone</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="games.html">Games</a></li>
            <li><a href="tournaments.html">Tournaments</a></li>
            <li><a href="register.html" class="active">Register</a></li>
            <li><a href="rules.html">Rules</a></li>
        </ul>
    </nav>

    

    <!-- Overlay -->
    <div class="overlay"></div>

    <!-- Register Form Content -->
    <div class="content">
        <h1>Register for GBG PlayZone</h1>
        <p>Join the ultimate gaming tournament platform</p>

        <form class="register-form" action="#" method="post">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm-password" placeholder="Confirm Password" required>
            <button type="submit" class="btn">Register Now</button>
        </form>

        <p style="margin-top:15px; color:white;">
            Already have an account? <a href="#" style="color:#ffcc00;">Login</a>
        </p>
    </div>

</body>
</html>
