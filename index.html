<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBG PlayZone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">GBG PlayZone</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Games</a></li>
            <li><a href="#">Tournaments</a></li>
            <li><a href="#">Register</a></li>
            <li><a href="#">Rules</a></li>
        </ul>
    </nav>

    <!-- VIDEO BACKGROUND -->
    <video autoplay muted loop id="bg-video">
        <source src="assets/videos/bg.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <!-- DARK OVERLAY -->
    <div class="overlay"></div>

    <!-- MAIN CONTENT -->
    <div class="content">
        <h1>GBG PlayZone</h1>
        <p>The Ultimate Gaming Tournament Platform</p>
        <a href="#" class="btn">Enter Arena</a>

        <section class="games">
            <div class="game-card">Free Fire</div>
            <div class="game-card">Minecraft</div>
            <div class="game-card">BGMI</div>
            <div class="game-card">PC Games</div>
        </section>
    </div>

</body>
</html>
